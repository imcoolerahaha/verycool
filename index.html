<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Fetcher</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input { width: 400px; padding: 8px; }
    button { padding: 8px 15px; margin-left: 5px; }
    #output { margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 200px; overflow: auto; background: #f9f9f9; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Web Fetcher (Public CORS Service)</h1>
<input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)">
<button id="fetchBtn">Fetch</button>
<div id="output"></div>

<script>
document.getElementById('fetchBtn').addEventListener('click', async () => {
    const url = document.getElementById('urlInput').value.trim();
    const output = document.getElementById('output');

    if (!url) {
        output.innerHTML = "Please enter a URL.";
        return;
    }

    output.textContent = "Loading...";

    try {
        // AllOrigins API — no "proxy" in domain
        const apiUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const response = await fetch(apiUrl);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        output.textContent = text;
    } catch (err) {
        output.innerHTML = `Error: ${err.message}`;
    }
});
</script>
</body>
</html>
